# ⚠️  DO NOT commit this file with real values!
# Use: kubectl create secret generic ise-acme-credentials --from-env-file=.env -n network-automation
# Or use an external secret manager (Vault, AWS Secrets Manager, etc.)

apiVersion: v1
kind: Secret
metadata:
  name: ise-acme-credentials
  namespace: network-automation
  labels:
    app: ise-acme
type: Opaque
stringData:
  ISE_USERNAME: "CHANGE_ME"
  ISE_PASSWORD: "CHANGE_ME"
  ACME_KID: "CHANGE_ME"
  ACME_HMAC_KEY: "CHANGE_ME"
  CLOUDFLARE_API_TOKEN: "CHANGE_ME"
  SMTP_PASSWORD: "CHANGE_ME"
