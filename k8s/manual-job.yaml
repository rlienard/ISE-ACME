# Use this to trigger a manual one-off renewal
# kubectl apply -f k8s/manual-job.yaml
# kubectl delete -f k8s/manual-job.yaml  (cleanup after)

apiVersion: batch/v1
kind: Job
metadata:
  name: ise-acme-manual-renewal
  namespace: network-automation
  labels:
    app: ise-acme
    trigger: manual
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 1800
  template:
    metadata:
      labels:
        app: ise-acme
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: ise-acme
          image: ise-acme-automation:latest
          imagePullPolicy: Always
          args:
            - "--action"
            - "force-renew"
            - "--config"
            - "/app/config/config.json"
          envFrom:
            - secretRef:
                name: ise-acme-credentials
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: ise-acme-config
